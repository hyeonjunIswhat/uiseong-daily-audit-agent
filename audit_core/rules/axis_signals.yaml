# 검토 축 규칙 선별 신호(2026-07-15 성능 규율) — 트리아지에서 LLM을 제거하기 위한
# 축별 키워드. 문서(공백 제거 본문)에 신호가 하나라도 있으면 그 축을 검토한다.
#
# 보수 원칙:
#   - 여기 없는 축 id(오버레이 M1·M2 등)는 항상 유지
#   - 신호 매칭 축이 2개 미만이면 전축 폴백(신호 부족 = 좁히지 않음)
#   - 스킵 축은 사유와 함께 '확인하지 못한 항목'으로 표시(침묵 금지)
# 축 번호는 rubric_v0_3(규정 §7④ 8축) 기준.
axes:
  "1":   # 사업추진의 합법성 및 필요성
    - 법
    - 조례
    - 규칙
    - 규정
    - 훈령
    - 지침
    - 근거
    - 방침
    - 필요성
    - 목적
  "2":   # 사업추진 내용의 타당성(경제성·효과성·효율성)
    - 원가
    - 산출
    - 단가
    - 예산
    - 사업비
    - 금액
    - 비용
    - 경제성
    - 효율
    - 효과
    - 소계
    - 합계
  "3":   # 사업일정의 적정성
    - 일정
    - 기간
    - 개월
    - 착수
    - 준공
    - 완료
    - 공정
    - 납기
    - 납품
  "4":   # 사업추진 주체의 적정성
    - 주체
    - 담당
    - 부서
    - 조직
    - 인력
    - 전담
    - 수행기관
    - 추진체계
  "5":   # 계약방법 및 절차의 적정성
    - 계약
    - 입찰
    - 수의
    - 협상
    - 공고
    - 낙찰
    - 발주
    - 조달
    - 제안
  "6":   # 업무처리 내용·절차의 법적 요건 구비
    - 서식
    - 서류
    - 첨부
    - 요건
    - 보증
    - 하자
    - 검사
    - 승인
    - 동의
    - 협의
    - 심사
  "7":   # 추진과정의 예상 문제점 및 어려움
    - 위험
    - 문제점
    - 지연
    - 민원
    - 갈등
    - 우려
    - 애로
    - 리스크
