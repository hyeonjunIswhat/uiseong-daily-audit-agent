# 일상감사 대상 판정 규칙 (기능 #1·#4). LLM 미관여 — 결정론적 규칙엔진.
#
# ── 출처 (의성군 실기준) ────────────────────────────────────────────
# 「의성군 일상감사 규정」 별표 '일상감사 대상업무 및 기준'(제4조 관련).
# 2026-07-15 ELIS 자치법규정보시스템에서 원문 HWP 자동 확보
# (alrNo=47730101205007, 원본·추출문: audit_core/storage/regulations/).
# 이전 버전(서울시 편람 잠정값)은 git 이력으로 보존.
#
# ⚠ provisional: true — 값은 별표 원문 그대로이나, 자동 확보분은 감사팀
#   담당자 확인(Lane B 승인)을 거쳐야 확정한다(F12 — 자동 확보 ≠ 자동 승인).
#   확인 완료 시 이 플래그만 false로 교체.
#
# ── 판정 기준 (별표 비고) ──────────────────────────────────────────
# 금액 기준은 '추정금액' = 지방계약법 시행령 제2조제1호의 추정가격에
# **부가가치세와 관급재료 가격을 합한** 금액이다. (서울시 편람의 '추정가격
# (부가세 제외)'과 다름 — 입력 금액이 부가세 제외분이면 보수적으로 REVIEW 권장)
# 판정 흐름: preconditions(선결 규칙)를 순서대로 평가 → 매칭 시 즉시 결정.
#           안 걸리면 categories(유형별 기준)로 판정.
# 결정 코드: TARGET(대상) | NOT_TARGET(대상아님) | REVIEW(확인필요) | EXCLUDED(제외)
provisional: true
currency_unit: KRW
amount_basis: 추정금액(추정가격 + 부가가치세 + 관급재료 가격, 별표 비고)
source: 의성군 일상감사 규정 별표(제4조 관련) — ELIS 원문(2026-07-15 확보)

decisions:
  TARGET: 일상감사 대상 (집행행위 전 의뢰 필요)
  NOT_TARGET: 대상 아님 (기준금액 미만)
  REVIEW: 감사팀 확인 필요 (예외·불명확·사후의뢰·조건부)
  EXCLUDED: 제외 대상

# ── 1단계: 선결 규칙 (유형·금액보다 우선, 위에서부터 평가) ──────────
# when 조건: type_any / flag_any / stage 중 지정된 것이 모두 참이면 매칭
preconditions:
  - id: PRE-EXCLUDED-OTHER-AUDIT
    when: { flag_any: [실지감사대상, 복무감사] }
    decision: EXCLUDED
    reason: 타 감사유형 대상 — 일상감사 범위 밖
    basis: [의성군 자체감사 규칙 제22조]

  - id: PRE-DISASTER-RESERVE
    when: { flag_any: [재해복구], type_any: [예비비] }
    decision: NOT_TARGET
    reason: 예비비 집행 중 재해복구 사업비는 별표 3-가 단서로 제외
    basis: [의성군 일상감사 규정 별표 3-가]

  - id: PRE-DEBT-CONTRACT
    when: { flag_any: [채무부담] }
    decision: TARGET
    reason: 군에 채무부담이 되는 계약 — 금액 무관 대상(별표 2-다)
    basis: [의성군 일상감사 규정 별표 2-다]

  - id: PRE-DESIGN-CHANGE
    when: { flag_any: [변경계약, 설계변경], type_any: [종합공사, 비종합공사, 공사] }
    decision: REVIEW
    reason: 계약금액 5억 이상 공사의 1회 설계변경이 계약금액의 10% 이상 증가하면 대상(별표 2-나) — 계약금액·증가율을 감사팀이 확인
    basis: [의성군 일상감사 규정 별표 2-나]

  - id: PRE-POST-EXECUTION
    when: { stage: 사후 }
    decision: REVIEW
    reason: 집행행위(공고·체결·결재) 후 의뢰 — 일상감사는 최종 결재 전 실시 원칙이므로 절차 적정성을 감사팀이 확인(규정 제5조①)
    basis: [공공감사에 관한 법률 제22조, 의성군 일상감사 규정 제5조]

  - id: PRE-URGENT
    when: { flag_any: [긴급, 재해복구, 재난] }
    decision: REVIEW
    reason: 긴급한 업무 추진 — 감사관 협의로 예외 인정 시 결재 이후 실시 가능(규정 제5조②), 대상 여부·시기를 감사팀과 확인
    basis: [의성군 일상감사 규정 제5조]

# ── 2단계: 유형별 기준 (별표 원문) ──────────────────────────────────
# kind: threshold  → 추정금액 >= min_amount(inclusive=false면 초과) 이면 TARGET
#       always     → 금액 무관, decision 그대로 (조건은 condition에 명시)
# eff_amount(변경계약이면 누계) 기준으로 비교.
categories:
  종합공사:                        # 별표 2-가
    kind: threshold
    min_amount: 300000000         # 추정금액 3억 원 이상
    basis: [의성군 일상감사 규정 별표 2-가]
  비종합공사:                      # 건설산업기본법 시행령 제7조의 종합공사가 아닌 공사
    kind: threshold
    min_amount: 200000000         # 추정금액 2억 원 이상
    basis: [의성군 일상감사 규정 별표 2-가, 건설산업기본법 시행령 제7조]
  용역:                            # 별표 2-가 (용역 구분 없음 — 협상·학술 포함)
    kind: threshold
    min_amount: 70000000          # 추정금액 7천만 원 이상
    basis: [의성군 일상감사 규정 별표 2-가]
  물품:                            # 물품의 제조·구매 계약
    kind: threshold
    min_amount: 20000000          # 추정금액 2천만 원 이상
    basis: [의성군 일상감사 규정 별표 2-가]
  민간자본보조:                    # 별표 1-나
    kind: threshold
    min_amount: 100000000         # 1억 원 이상 민간자본보조금 지원사업
    basis: [의성군 일상감사 규정 별표 1-나]
  민간위탁:                        # 별표 1-나 (민간위탁금 지원사업)
    kind: threshold
    min_amount: 100000000         # 1억 원 이상
    basis: [의성군 일상감사 규정 별표 1-나]
  투융자심사신규:                  # 별표 1-가
    kind: always
    decision: TARGET
    condition: 당해연도 투·융자심사 대상사업에 신규로 포함되는 사업이면 금액 무관 대상
    basis: [의성군 일상감사 규정 별표 1-가]
  예비비:                          # 별표 3-가 (재해복구 사업비 제외 — 선결규칙)
    kind: always
    decision: TARGET
    condition: 예비비 집행에 관한 사항(재해복구 사업비 제외)
    basis: [의성군 일상감사 규정 별표 3-가]
  지방채:                          # 별표 3-나
    kind: always
    decision: TARGET
    condition: 지방채 발행에 관한 사항
    basis: [의성군 일상감사 규정 별표 3-나]
  군수선정업무:                    # 별표 4-가 — 수동 대상 지정 경로(설계서 A4)
    kind: always
    decision: TARGET
    condition: 군수가 사전 예방적 감사가 필요하다고 선정한 업무
    basis: [의성군 일상감사 규정 별표 4-가]

# 유형 미매칭이면 REVIEW(확인필요) — 임의 탈락 방지
unknown_type_decision: REVIEW

# ── 입력 정규화 (사용자 표현 → 위 categories 키) ────────────────────
aliases:
  공사: 종합공사
  건설공사: 종합공사
  시설공사: 종합공사
  토목공사: 종합공사
  건축공사: 종합공사
  전문공사: 비종합공사
  전기공사: 비종합공사
  정보통신공사: 비종합공사
  소방공사: 비종합공사
  소방시설공사: 비종합공사
  문화재공사: 비종합공사
  국가유산수리공사: 비종합공사
  일반용역: 용역
  기술용역: 용역
  학술용역: 용역                   # 의성군 별표에는 학술용역 제외 규정 없음 — 용역 기준 적용
  협상용역: 용역                   # 별표는 계약방법 구분 없이 용역 단일 기준(7천만)
  협상에의한계약용역: 용역
  축제대행: 용역
  행사대행: 용역
  축제행사대행: 용역
  설계공모: 용역
  물품구매: 물품
  물품제조: 물품
  구매: 물품
  민간자본보조: 민간자본보조
  민간보조: 민간자본보조
  보조사업: 민간자본보조
  신규보조: 민간자본보조
  지방보조: 민간자본보조
  보조금: 민간자본보조
  계속보조: 민간자본보조
  계속보조사업: 민간자본보조
  민간위탁: 민간위탁
  민간위탁사업: 민간위탁
  투융자심사: 투융자심사신규
  투자심사: 투융자심사신규
  예비비: 예비비
  지방채: 지방채
  지방채발행: 지방채

# 별표에 제외 유형 없음 — 서울 편람의 학술용역 제외는 의성군에 부존재하여 폐기
excluded_type_aliases: {}

method_aliases:
  수의: 수의계약
  수의계약: 수의계약
  일반입찰: 일반입찰
  경쟁입찰: 일반입찰
  지명경쟁: 지명경쟁입찰
  지명입찰: 지명경쟁입찰
  협상: 협상에 의한 계약
  협상에의한계약: 협상에 의한 계약

# 판정에 무관하나 결과 안내에 함께 표시할 참고사항
global_notes:
  - 금액 판정 기준은 '추정금액'(추정가격 + 부가가치세 + 관급재료, 별표 비고)입니다. 부가세 제외 금액으로 판정 시 경계 구간은 감사팀 확인을 권장합니다.
  - 계약금액 5억 이상 공사의 1회 설계변경 10% 이상 증가는 대상입니다(변경계약·설계변경 플래그 시 확인 안내).
  - 기준은 의성군 일상감사 규정 별표 원문(ELIS 2026-07-15 확보)이며, 감사팀 확인 전까지 잠정 표시를 유지합니다.

statutory_basis:
  - 공공감사에 관한 법률 제22조
  - 의성군 자체감사 규칙 제22조
  - 의성군 일상감사 규정 제4조 및 별표
