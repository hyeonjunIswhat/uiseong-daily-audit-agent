# 사업성격 신호 사전 — BusinessClassifier의 데이터 (REBUILD 회차 3, 2026-07-15)
#
# 원칙: 현실 문서 표현("플랫폼 구축", "서버 도입")을 일상감사 법정 유형
# (용역/물품/종합·비종합공사/민간보조/민간위탁)으로 '접는' 계층의 신호 사전.
# 값 교체만으로 개정(코드 무수정). 계약방법은 유형이 아니다 — 오버레이로만.
provisional: true
source: 실물 사례 6건(플랫폼·GPU·한컴·스카이디펜스런) + 사용자 명세(2026-07-15)

# 행위(동사) 신호 — 사업명 안에 있으면 가중 ×3
actions:
  용역: [구축, 개발, 고도화, 유지관리, 유지보수, 운영, 대행, 컨설팅, 감리, 설계, 연구, 용역, 위탁운영, 조사, 진단, 교육]
  물품: [구매, 도입, 납품, 제조, 임차, 구입]
  공사: [공사, 시공, 신축, 증축, 개축, 보수공사, 철거]

# 산출물(명사) 신호
outputs:
  용역: [시스템, 플랫폼, 소프트웨어, SW, 서비스, 행사, 축제, 보고서, 홈페이지, 앱, 챗봇, 데이터셋, 콘텐츠]
  물품: [서버, 스토리지, 장비, 물품, 라이선스, SDK, PC, 프린터, 기자재, 비품, 차량, 단말]

# 공종 신호 — '설치'만으로 공사가 아니다. 공종어 + (공사|설비|시공)일 때만 공사 후보
trades:
  비종합공사: [전기, 정보통신, 소방, 문화재, 국가유산]
  종합공사: [건축, 토목, 조경]

# 보조·위탁 신호
grants:
  민간자본보조: [민간자본보조, 보조금, 자부담, 보조사업, 교부]
  민간위탁: [민간위탁, 수탁기관, 위탁금, 위·수탁]

# 부수 행위 — 단독으로 유형을 정하지 않고 혼합 메모만 남긴다
ancillary: [설치, 구성, 셋팅, 세팅, 이설, 배선]

# subtype 규칙 — primary 확정 후 첫 매칭
subtypes:
  용역:
    SW개발용역: [구축, 개발, 소프트웨어, SW, 플랫폼, 시스템, 앱, 챗봇]
    유지관리용역: [유지관리, 유지보수]
    행사대행: [행사, 축제, 대행]
    학술연구: [연구, 학술]
    감리용역: [감리]
    설계용역: [설계]
  물품:
    라이선스구매: [라이선스, SDK]
    장비도입: [서버, 스토리지, 장비, GPU, 기자재]
    물품구매: []          # 기본값
  비종합공사:
    전기공사: [전기]
    정보통신공사: [정보통신]
    소방공사: [소방]
  종합공사:
    건축공사: [건축]
    토목공사: [토목]
