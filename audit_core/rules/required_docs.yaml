# 문서유형 사전 + 사건유형별 필수서류 매핑 (설계서 §6 A2, REBUILD 회차 1)
#
# "서류 완결성 확인은 이용자의 사전 의무가 아니라 시스템의 첫 번째 산출물이다."
# 파일명·형식·순서 무관하게 받은 뒤(drop-anything) 내용 기반으로 유형을 인식하고,
# 사건유형(계약방법)별 필수서류와 대조해 [인식됨/누락/확인필요] 3분류 리포트를 낸다.
# 누락 시 보완요청 문안 자동 생성 — 원가심사 규칙 §6③(보완 통지)의 자동화.
#
# 문서유형 10종은 설계서 §6 실물 기준 사전. 키워드는 실물 파일(요청서 별지1호·
# 산출내역서 xlsx·협상 대상사업 검토서 등) 표제에서 채집. 공백 무시 매칭.
provisional: true
source: 설계서 §6 문서유형 사전 + 실물 사례 3건(생성형AI플랫폼·GPU서버·한컴SDK) 구성 — 감사팀 협의 대상

doc_types:
  일상감사요청서:
    label: 일상감사 요청서(별지 제1호서식)
    keywords: ["일상감사 요청서", "일상감사요청서", "일상감사 의뢰"]
  사업계획서:
    label: 사업계획·방침서
    keywords: ["사업계획", "추진계획", "방침서", "추진 계획"]
  산출내역서:
    label: 산출내역서·원가계산서
    keywords: ["산출내역서", "원가계산서", "원가산정", "기능점수", "FP산정", "설계내역서", "산출 내역"]
  제안요청서:
    label: 제안요청서·과업지시서
    keywords: ["제안요청서", "과업지시서", "과업내용서", "제안 요청서"]
  규격서:
    label: 규격서·납품조건서
    keywords: ["규격서", "납품조건"]
  계약방법검토서:
    label: 계약방법 검토서(협상 대상사업 검토서 등)
    keywords: ["계약 대상사업 검토서", "계약방법 검토", "협상에 의한 계약 대상사업"]
  수의계약사유서:
    label: 수의계약 사유서
    keywords: ["수의계약 사유서", "수의계약사유서", "수의시담", "수의 계약 사유"]
  긴급입찰사유서:
    label: 긴급입찰 사유서
    keywords: ["긴급입찰 사유서", "긴급입찰사유서"]
    form: 01.긴급입찰사유서.hwp   # L4 서식 보유 — 보완요청 시 안내
  의견서:
    label: 일상감사 의견서(별지 제2호서식)
    keywords: ["일상감사 의견서"]
  조치결과통보서:
    label: 조치결과 통보서(별지 제3호서식)
    keywords: ["조치결과 통보서", "조치결과통보서", "조치결과 반영"]

# 필수서류 그룹 — 위에서 아래로 평가, when_* 조건이 모두 맞는 그룹의 docs를 합산.
# 조건 없는 그룹(공통)은 항상 적용. 계약방법·사업유형은 부분일치(정규화 전 원문 허용).
requirements:
  - id: 공통
    docs: [일상감사요청서, 사업계획서, 산출내역서]
  - id: 협상계약
    when_method_contains: [협상]
    docs: [제안요청서, 계약방법검토서]
  - id: 수의계약
    when_method_contains: [수의]
    docs: [수의계약사유서]
  - id: 긴급입찰
    when_method_contains: [긴급]
    docs: [긴급입찰사유서]
  - id: 물품구매
    when_biz_contains: [물품, 구매]
    docs: [규격서]
