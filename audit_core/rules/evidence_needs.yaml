# 축별 필요 근거 서류(2026-07-15 품질 규율) — 결정론 EVIDENCE_MISSING 판정.
#
# 그 축의 판단에 필수적인 서류유형(required_docs.yaml doc_types 키)이 하나도
# 첨부·인식되지 않았으면, 그 축의 항목들은 LLM에 보내지 않고 '필요 근거 미첨부'
# 로 사전 처리한다 — "31개 중 대부분 판단 불가" 뭉뚱그림 방지:
#   · 무엇이 없어서(서류명) 무엇을 확인할 수 없는지(missing_note)를 항목에 명시
#   · LLM 호출량도 줄어든다(판단 불가가 뻔한 항목을 보내지 않음)
# needs는 OR 조건 — 나열된 유형 중 하나라도 있으면 그 축은 정상 검토.
# 여기 없는 축(1 합법성, 5 계약방법, 7 예상문제, 오버레이 M*)은 본문만으로 검토.
axes:
  "2":   # 사업추진 내용의 타당성(경제성·효과성·효율성) — 원가 판단
    needs: [산출내역서]
    missing_note: "산출내역서·원가계산서가 없어 단가·수량·산식·총액의 산출근거를 확인할 수 없음"
  "3":   # 사업일정의 적정성
    needs: [사업계획서, 제안요청서, 규격서]
    missing_note: "사업계획서·제안요청서(과업지시서)·규격서가 없어 추진 일정·기간 계획을 확인할 수 없음"
  "4":   # 사업추진 주체의 적정성
    needs: [사업계획서, 제안요청서]
    missing_note: "사업계획서·제안요청서가 없어 추진 주체·수행 체계를 확인할 수 없음"
  "6":   # 업무처리 내용·절차의 법적 요건 구비
    needs: [제안요청서, 규격서, 사업계획서]
    missing_note: "제안요청서(과업지시서)·규격서·사업계획서가 없어 요건·조건 기재를 확인할 수 없음"
