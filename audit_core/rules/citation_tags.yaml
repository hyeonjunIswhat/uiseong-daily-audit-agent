# 근거 태그 분류기준 — 인용 권한 (마스터 SOP 제2부, 설계서 §4)
#
# 문서 목록 고정이 아니라 '분류기준'으로 운용한다(SOP 원칙). 새 규정이 나타나면
# 아래 패턴으로 분류하되, 어느 태그에도 안 걸리면 '미분류' — 인용 전 담당자 확인.
#
# 분류 우선순위: 취지참고 → 원가적용 → 직접적용 (순서 중요)
#   오분류의 위험 방향은 [취지참고] 자료가 [직접적용]으로 승격되는 쪽이므로
#   배제 패턴(취지참고)을 먼저 평가한다.
provisional: true
source: 감사팀 실무 SOP 제2부 태그 분류기준 (통합운영문서, 2026-07)

tags:
  취지참고:
    desc: '"~취지 참고" 형태로만 사용 — 결론 근거 인용 금지'
    # 국가 대상 법령 / 중앙부처 지침 / 유권해석 / 타 지자체 자료
    patterns:
      - 국가계약법
      - 국가를 당사자로 하는
      - 국고보조금
      - 조달청
      - 유권해석
      - 질의회신
      - 서울시
      - 서울특별시
      - 대구시
      - 대구광역시
      - 경기도

  원가적용:
    desc: 원가 쟁점 전용 — 원가심사 체계 출력을 인용만 하고 재계산하지 않는다
    patterns:
      - 원가심사
      - 계약원가

  직접적용:
    desc: 조문을 결론 근거로 인용 가능
    # 법률·시행령·시행규칙 / 지자체 전체 적용 행정규칙(행안부 예규 등) /
    # 해당 기관 자치법규 / 사업 연관 매뉴얼·업무편람(최신본 확인 시)
    patterns:
      - 지방계약법
      - 지방자치단체를 당사자로 하는
      - 지방재정법
      - 지방회계법
      - 공공감사
      - 지방보조금
      - 지방자치단체 입찰
      - 낙찰자 결정기준
      - 낙찰자결정기준
      - 자체감사기준
      - 의성군
