# 문서유형(doc_type)별 검토 프로파일 — 어떤 문서로 어떤 축을 판단할 수 있는가.
#
# 배경: 실무 입력은 의뢰서(전체 서류 세트)만이 아니라 단일 문서 3종이 흔하다
#   ① 과업발주 전 계획서·공고문 ② 개발사업 FP계산서·API산출내역서 ③ 업무추진계획서
# 단일 문서에 전축(A~E)을 돌리면 판단 불가 축이 UNABLE 노이즈 + 축당 검토 시간만
# 소모하므로, 문서유형이 명확할 때만 판단 가능한 축으로 좁힌다.
#
# 보수 원칙(제약 A2): 좁히기는 유형이 '단일하고 명확'할 때만.
#   - 키워드가 2개 유형 이상에 걸리면 복합 문서로 보고 전축 검토
#   - 아무 유형도 안 걸리면 기본 프로파일(전축)
#   - 스킵된 축은 침묵하지 않고 리포트에 사유와 함께 표시(skip_note)
#
# provisional: 축 배정은 감사팀 협의로 조정 가능. 값 교체만으로 반영(코드 무수정).
provisional: true
source: 실무 입력 3종 실측(2026-07-09 공고문 hwpx) 기반 설계 — 감사팀 협의 대상
default_profile: 의뢰서

# 루브릭 축(v0.3, 규정 §7④): 1 합법성·필요성 / 2 타당성(원가) / 3 일정 / 4 주체 / 5 계약방법·절차 / 6 법적 요건 / 7 예상문제점
profiles:
  의뢰서:
    label: 일상감사 의뢰서(전체 서류 세트)
    axes: ['1', '2', '3', '4', '5', '6', '7']
    # 실물 서식(별지 제1호) 표제 '일상감사 요청서' 포함 — 매칭은 공백 무시(자간 공백 대응)
    keywords: ["일상감사 의뢰", "감사의뢰", "일상감사의뢰서", "일상감사 요청서"]

  공고문:
    label: 공고문(모집·입찰)
    axes: ['1', '5']
    keywords: ["공고문", "모집 공고", "입찰공고", "모집공고", "재공고"]
    # 코드에서 정규식 보강: "○○ 공고 제2026-N호" 머리글
    skip_note: 타당성(2)·일정(3)·주체(4)·법적 요건(6) 축은 공고문만으로 판단 불가 — 계획서·원가계산서 첨부 시 검토 가능

  계산서:
    label: 원가·FP 계산서(산출내역)
    axes: ['2', '6']
    keywords: ["원가계산서", "산출내역서", "기능점수", "FP산정", "원가산정서", "설계내역서"]
    skip_note: 합법성(1)·일정(3)·주체(4)·계약방법(5) 축은 계산서만으로 판단 불가 — 계획서·계약서류 필요

  추진계획서:
    label: 업무추진계획서(사업계획)
    axes: ['1', '3', '4', '5']
    keywords: ["업무추진계획", "추진계획서", "추진 계획", "사업추진계획"]
    skip_note: 타당성-원가(2)·법적 요건(6) 축은 계획서만으로 판단 불가 — 원가계산서·계약조건 서류 필요
